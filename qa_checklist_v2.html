<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QA 체크리스트 · 통합 제어 모니터링 플랫폼</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.css" />
<style>
  :root {
    --bg: #F4F0E6;
    --bg-paper: #FBF8F1;
    --ink: #18181B;
    --ink-soft: #3F3F46;
    --muted: #71717A;
    --muted-2: #A1A1AA;
    --line: #E0DBCC;
    --line-soft: #ECE7DA;
    --accent: #B45309;
    --accent-soft: #FEF3C7;
    --success: #166534;
    --danger: #991B1B;
    --warning: #EA580C;
    --shadow-sm: 0 1px 0 rgba(0,0,0,0.04);
    --shadow-md: 0 8px 24px -8px rgba(24,24,27,0.08);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    font-feature-settings: "ss01", "ss02";
    -webkit-font-smoothing: antialiased;
    line-height: 1.5;
  }

  body {
    background:
      radial-gradient(ellipse at top, rgba(180,83,9,0.04), transparent 60%),
      var(--bg);
    background-attachment: fixed;
    min-height: 100vh;
  }

  .page {
    max-width: 980px;
    margin: 0 auto;
    padding: 48px 32px 120px;
  }

  /* ===== HEADER ===== */
  .header { margin-bottom: 40px; }
  .eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .eyebrow::before {
    content: '';
    width: 24px;
    height: 1px;
    background: var(--ink);
  }
  h1 {
    font-family: 'Instrument Serif', serif;
    font-weight: 400;
    font-size: 64px;
    line-height: 1;
    letter-spacing: -0.02em;
    margin-bottom: 8px;
  }
  h1 .italic {
    font-style: italic;
    color: var(--accent);
  }
  .subtitle {
    font-size: 15px;
    color: var(--muted);
    margin-bottom: 32px;
  }

  /* ===== META BAR ===== */
  .meta-bar {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 0;
    border-top: 1px solid var(--line);
    border-bottom: 1px solid var(--line);
    padding: 20px 0;
    margin-bottom: 32px;
  }
  .meta-item {
    border-right: 1px solid var(--line);
    padding: 0 24px;
  }
  .meta-item:first-child { padding-left: 0; }
  .meta-item:last-child { border-right: none; padding-right: 0; }
  .meta-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .meta-input {
    background: transparent;
    border: none;
    border-bottom: 1px dashed transparent;
    font-family: inherit;
    font-size: 15px;
    color: var(--ink);
    width: 100%;
    padding: 2px 0;
    transition: border-color 0.2s;
  }
  .meta-input:hover { border-bottom-color: var(--line); }
  .meta-input:focus {
    outline: none;
    border-bottom-color: var(--accent);
  }
  .meta-input::placeholder { color: var(--muted-2); }

  /* ===== SCREEN TABS ===== */
  .screen-tabs-wrap {
    margin-bottom: 32px;
  }
  .screen-tabs-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
  }
  .screen-tabs {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .tab {
    background: var(--bg-paper);
    border: 1px solid var(--line);
    border-radius: 2px;
    padding: 14px 20px;
    cursor: pointer;
    font-family: inherit;
    text-align: left;
    transition: all 0.2s;
    display: flex;
    flex-direction: column;
    gap: 4px;
    min-width: 200px;
  }
  .tab:hover {
    border-color: var(--accent);
    background: var(--accent-soft);
  }
  .tab.active {
    background: var(--ink);
    border-color: var(--ink);
    color: var(--bg-paper);
  }
  .tab-num {
    font-family: 'Instrument Serif', serif;
    font-style: italic;
    font-size: 13px;
    color: var(--accent);
    margin-bottom: 2px;
  }
  .tab.active .tab-num { color: var(--accent-soft); }
  .tab-title {
    font-size: 15px;
    font-weight: 600;
    color: var(--ink);
  }
  .tab.active .tab-title { color: var(--bg-paper); }
  .tab-progress {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    margin-top: 4px;
  }
  .tab.active .tab-progress { color: var(--muted-2); }
  .tab-progress.complete { color: var(--success); }
  .tab.active .tab-progress.complete { color: #86EFAC; }

  /* ===== PROGRESS SUMMARY ===== */
  .progress-summary {
    background: var(--bg-paper);
    border: 1px solid var(--line);
    border-radius: 2px;
    padding: 32px;
    margin-bottom: 48px;
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 32px;
    align-items: center;
    box-shadow: var(--shadow-md);
  }
  .percent-display {
    font-family: 'Instrument Serif', serif;
    font-size: 88px;
    line-height: 0.9;
    letter-spacing: -0.04em;
    color: var(--ink);
    font-variant-numeric: tabular-nums;
  }
  .percent-display .pct-symbol {
    font-size: 32px;
    color: var(--accent);
    font-style: italic;
    margin-left: 4px;
  }
  .progress-middle {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .progress-screen-name {
    font-size: 13px;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.05em;
  }
  .progress-bar-wrap {
    height: 6px;
    background: var(--line-soft);
    border-radius: 999px;
    overflow: hidden;
    position: relative;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--ink) 0%, var(--accent) 100%);
    border-radius: 999px;
    transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    width: 0%;
  }
  .progress-counts {
    display: flex;
    gap: 24px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
  }
  .progress-counts span strong {
    color: var(--ink);
    font-weight: 500;
  }
  .progress-counts span { color: var(--muted); }
  .actions {
    display: flex;
    gap: 8px;
    flex-direction: column;
  }
  .btn {
    background: transparent;
    border: 1px solid var(--line);
    color: var(--ink);
    padding: 8px 16px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .btn:hover {
    background: var(--ink);
    color: var(--bg-paper);
    border-color: var(--ink);
  }
  .btn.danger:hover {
    background: var(--danger);
    border-color: var(--danger);
  }

  /* ===== SECTIONS ===== */
  .section { margin-bottom: 56px; scroll-margin-top: 24px; }
  .section-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 24px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--line);
  }
  .section-title {
    display: flex;
    align-items: baseline;
    gap: 16px;
  }
  .section-number {
    font-family: 'Instrument Serif', serif;
    font-style: italic;
    font-size: 28px;
    color: var(--accent);
    line-height: 1;
  }
  .section-title h2 {
    font-family: 'Pretendard Variable', sans-serif;
    font-weight: 600;
    font-size: 22px;
    letter-spacing: -0.01em;
    color: var(--ink);
  }
  .section-progress {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .section-progress .mini-bar {
    width: 80px;
    height: 3px;
    background: var(--line-soft);
    border-radius: 999px;
    overflow: hidden;
  }
  .section-progress .mini-bar-fill {
    height: 100%;
    background: var(--ink);
    transition: width 0.4s ease;
    width: 0%;
  }
  .section-progress.complete .mini-bar-fill { background: var(--success); }
  .section-progress.complete .count { color: var(--success); }

  /* ===== SUBSECTIONS ===== */
  .subsection { margin-bottom: 20px; }
  .subsection:last-child { margin-bottom: 0; }
  .subsection-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--ink-soft);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 8px;
  }

  /* ===== CHECKLIST ITEM ===== */
  .item {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid var(--line-soft);
    cursor: pointer;
    transition: background 0.15s;
    user-select: none;
  }
  .item:last-child { border-bottom: none; }
  .item:hover {
    background: linear-gradient(90deg, rgba(180,83,9,0.04), transparent);
    padding-left: 8px;
    margin-left: -8px;
  }
  .checkbox {
    flex-shrink: 0;
    width: 18px;
    height: 18px;
    border: 1.5px solid var(--ink-soft);
    border-radius: 3px;
    margin-top: 3px;
    position: relative;
    transition: all 0.2s;
    background: var(--bg-paper);
  }
  .item:hover .checkbox { border-color: var(--accent); }
  .item.checked .checkbox {
    background: var(--ink);
    border-color: var(--ink);
  }
  .item.checked .checkbox::after {
    content: '';
    position: absolute;
    left: 4px;
    top: 0px;
    width: 5px;
    height: 10px;
    border: solid var(--bg-paper);
    border-width: 0 1.5px 1.5px 0;
    transform: rotate(45deg);
    animation: checkPop 0.25s ease-out;
  }
  @keyframes checkPop {
    0% { transform: rotate(45deg) scale(0); opacity: 0; }
    50% { transform: rotate(45deg) scale(1.2); opacity: 1; }
    100% { transform: rotate(45deg) scale(1); }
  }
  .item-text {
    font-size: 15px;
    color: var(--ink);
    line-height: 1.55;
    flex: 1;
    transition: all 0.3s;
  }
  .item.checked .item-text {
    color: var(--muted-2);
    text-decoration: line-through;
    text-decoration-color: var(--muted-2);
    text-decoration-thickness: 1px;
  }
  .item-text .quote {
    background: var(--accent-soft);
    padding: 1px 6px;
    border-radius: 2px;
    font-size: 0.92em;
    color: var(--ink);
    font-weight: 500;
  }
  .item-text .quote.warning {
    background: #FED7AA;
  }
  .item-text .quote.danger {
    background: #FECACA;
  }
  .item.checked .item-text .quote {
    background: transparent;
    color: var(--muted-2);
  }

  /* ===== ISSUE LOG ===== */
  .issue-log {
    margin-top: 64px;
    border-top: 2px solid var(--ink);
    padding-top: 32px;
  }
  .issue-log h2 {
    font-family: 'Instrument Serif', serif;
    font-weight: 400;
    font-size: 36px;
    margin-bottom: 4px;
  }
  .issue-log h2 .italic {
    font-style: italic;
    color: var(--accent);
  }
  .issue-log .subtitle {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 20px;
  }
  .issues-table {
    width: 100%;
    border-collapse: collapse;
    background: var(--bg-paper);
    border: 1px solid var(--line);
    margin-bottom: 12px;
  }
  .issues-table th {
    text-align: left;
    padding: 10px 12px;
    background: var(--line-soft);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 500;
    border-bottom: 1px solid var(--line);
  }
  .issues-table td {
    padding: 0;
    border-bottom: 1px solid var(--line-soft);
    vertical-align: top;
  }
  .issues-table tr:last-child td { border-bottom: none; }
  .issues-table input, .issues-table select {
    width: 100%;
    border: none;
    background: transparent;
    padding: 10px 12px;
    font-family: inherit;
    font-size: 14px;
    color: var(--ink);
  }
  .issues-table input:focus, .issues-table select:focus {
    outline: none;
    background: var(--accent-soft);
  }
  .issues-table select { cursor: pointer; }
  .delete-issue {
    background: none;
    border: none;
    color: var(--muted-2);
    cursor: pointer;
    font-size: 16px;
    padding: 10px 12px;
    transition: color 0.15s;
  }
  .delete-issue:hover { color: var(--danger); }
  .add-issue-btn {
    background: transparent;
    border: 1px dashed var(--line);
    color: var(--muted);
    padding: 10px 16px;
    width: 100%;
    cursor: pointer;
    font-family: inherit;
    font-size: 13px;
    transition: all 0.15s;
  }
  .add-issue-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
    border-style: solid;
  }

  /* ===== OVERALL SUMMARY ===== */
  .overall-summary {
    margin-top: 64px;
    padding: 24px;
    background: var(--bg-paper);
    border: 1px solid var(--line);
    border-radius: 2px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
  }
  .overall-stat {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .overall-stat-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .overall-stat-value {
    font-family: 'Instrument Serif', serif;
    font-size: 36px;
    line-height: 1;
    color: var(--ink);
  }
  .overall-stat-value .accent {
    font-style: italic;
    color: var(--accent);
  }

  /* ===== FOOTER ===== */
  .footer {
    margin-top: 80px;
    padding-top: 24px;
    border-top: 1px solid var(--line);
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.05em;
  }

  /* ===== PRINT ===== */
  @media print {
    body { background: white; }
    .actions, .add-issue-btn, .delete-issue, .screen-tabs-wrap { display: none; }
    .item { break-inside: avoid; }
    .section { break-inside: avoid-page; }
    .progress-summary { box-shadow: none; }
    /* Print all screens */
    .screen-content { display: block !important; }
    .screen-content::before {
      content: attr(data-screen-title);
      display: block;
      font-family: 'Instrument Serif', serif;
      font-size: 28px;
      margin: 40px 0 20px;
      padding-bottom: 10px;
      border-bottom: 2px solid var(--ink);
    }
  }

  /* ===== MOBILE ===== */
  @media (max-width: 720px) {
    .page { padding: 32px 20px 80px; }
    h1 { font-size: 44px; }
    .percent-display { font-size: 64px; }
    .progress-summary {
      grid-template-columns: 1fr;
      gap: 20px;
      padding: 24px;
    }
    .actions { flex-direction: row; }
    .meta-bar {
      grid-template-columns: 1fr;
      gap: 16px;
    }
    .meta-item {
      border-right: none;
      border-bottom: 1px solid var(--line);
      padding: 0 0 16px;
    }
    .meta-item:last-child { border-bottom: none; padding-bottom: 0; }
    .section-header { flex-direction: column; align-items: flex-start; gap: 8px; }
    .overall-summary { grid-template-columns: 1fr; }
    .tab { min-width: 0; flex: 1; }
  }

  .screen-content { display: none; }
  .screen-content.active { display: block; }
</style>
</head>
<body>
<div class="page">

  <!-- ===== HEADER ===== -->
  <header class="header">
    <div class="eyebrow">QA Checklist · 통합 제어 모니터링 플랫폼</div>
    <h1>QA <span class="italic">체크리스트</span></h1>
    <p class="subtitle">디코나이 피그마 시안 기준 · 화면별 검수 진행</p>

    <div class="meta-bar">
      <div class="meta-item">
        <div class="meta-label">Reviewer</div>
        <input class="meta-input" id="meta-reviewer" placeholder="검토자 이름 입력">
      </div>
      <div class="meta-item">
        <div class="meta-label">Date</div>
        <input class="meta-input" id="meta-date" type="date">
      </div>
      <div class="meta-item">
        <div class="meta-label">Environment</div>
        <input class="meta-input" id="meta-env" placeholder="예: Staging / Chrome 125">
      </div>
    </div>
  </header>

  <!-- ===== SCREEN TABS ===== -->
  <div class="screen-tabs-wrap">
    <div class="screen-tabs-label">화면 선택</div>
    <nav class="screen-tabs" id="screen-tabs"></nav>
  </div>

  <!-- ===== PROGRESS SUMMARY ===== -->
  <div class="progress-summary">
    <div class="percent-display">
      <span id="percent-num">0</span><span class="pct-symbol">%</span>
    </div>
    <div class="progress-middle">
      <div class="progress-screen-name" id="progress-screen-name">로그인</div>
      <div class="progress-bar-wrap">
        <div class="progress-bar-fill" id="progress-fill"></div>
      </div>
      <div class="progress-counts">
        <span>완료 <strong id="count-done">0</strong></span>
        <span>전체 <strong id="count-total">0</strong></span>
        <span>남음 <strong id="count-left">0</strong></span>
      </div>
    </div>
    <div class="actions">
      <button class="btn" onclick="window.print()">Print / PDF</button>
      <button class="btn danger" onclick="resetCurrentScreen()">현재 초기화</button>
    </div>
  </div>

  <!-- ===== SCREEN CONTENT ===== -->
  <main id="screens-root"></main>

  <!-- ===== OVERALL SUMMARY ===== -->
  <section class="overall-summary">
    <div class="overall-stat">
      <div class="overall-stat-label">전체 진행률</div>
      <div class="overall-stat-value">
        <span id="overall-percent" class="accent">0</span>%
      </div>
    </div>
    <div class="overall-stat">
      <div class="overall-stat-label">전체 이슈</div>
      <div class="overall-stat-value">
        <span id="overall-issues" class="accent">0</span>건
      </div>
    </div>
  </section>

  <footer class="footer">
    <span>QA CHECKLIST · DECONICE FIGMA · v2.0</span>
    <span id="last-saved">자동 저장됨</span>
  </footer>
</div>

<script>
  // ============ DATA ============
  const SCREENS = [
    {
      id: 'login',
      title: '로그인',
      sections: [
        {
          title: "UI / 디자인 요소",
          subs: [
            { title: "1.1 백그라운드", items: [
              "백그라운드 디자인(이미지 또는 색상)이 시안과 일치하는가",
              "이미지가 깨지거나 흐려지지 않는가",
              "다양한 해상도에서 배경이 정상적으로 표시되는가",
            ]},
            { title: "1.2 에어위드 로고", items: [
              "에어위드 로고가 정상 위치에 표시되는가",
              "로고 이미지 해상도가 적절한가 (깨짐/흐림 없음)",
              "로고 클릭 시 동작 정의가 시안과 일치하는가 (해당 시)",
            ]},
            { title: "1.3 플랫폼명", items: [
              "메인 플랫폼명이 정확한 문구로 표시되는가",
              "폰트, 크기, 색상, 자간이 시안과 일치하는가",
            ]},
            { title: "1.4 로그인 관련 문의 문구", items: [
              "문의 문구가 시안과 동일한 텍스트로 표시되는가",
              "문구 위치, 정렬, 스타일이 시안과 일치하는가",
            ]},
          ]
        },
        {
          title: "입력 필드",

  // ============ STATE ============
  const STORAGE_KEY = 'qa-checklist-v2';
  let state = {
    activeScreenId: 'login',
    meta: { reviewer: '', date: '', env: '' },
    screens: {}
  };

  // Initialize per-screen state
  SCREENS.forEach(s => {
    state.screens[s.id] = { checks: {}, issues: [] };
  });

  // ============ STORAGE ============
  const hasLocalStorage = (() => {
    try {
      const k = '__test__';
      localStorage.setItem(k, k);
      localStorage.removeItem(k);
      return true;
    } catch (e) { return false; }
  })();

  async function saveState() {
    try {
      const payload = JSON.stringify(state);
      if (hasLocalStorage) {
        localStorage.setItem(STORAGE_KEY, payload);
      } else if (typeof window.storage !== 'undefined' && window.storage?.set) {
        await window.storage.set(STORAGE_KEY, payload);
      }
      flashSaved();
    } catch (e) {
      console.error('Storage save failed:', e);
    }
  }

  async function loadState() {
    try {
      let raw = null;
      if (hasLocalStorage) {
        raw = localStorage.getItem(STORAGE_KEY);
      } else if (typeof window.storage !== 'undefined' && window.storage?.get) {
        const result = await window.storage.get(STORAGE_KEY);
        raw = result && result.value ? result.value : null;
      }
      if (raw) {
        const parsed = JSON.parse(raw);
        // Merge carefully to preserve structure
        state.activeScreenId = parsed.activeScreenId || 'login';
        state.meta = { ...state.meta, ...(parsed.meta || {}) };
        SCREENS.forEach(s => {
          if (parsed.screens && parsed.screens[s.id]) {
            state.screens[s.id] = {
              checks: parsed.screens[s.id].checks || {},
              issues: parsed.screens[s.id].issues || []
            };
          }
        });
      }
    } catch (e) {
      // first run or no data
    }
  }

  let saveTimer;
  function flashSaved() {
    const el = document.getElementById('last-saved');
    if (!el) return;
    el.textContent = '✓ 저장됨 · ' + new Date().toLocaleTimeString('ko-KR');
    el.style.color = 'var(--success)';
    clearTimeout(saveTimer);
    saveTimer = setTimeout(() => {
      el.style.color = 'var(--muted)';
      el.textContent = '자동 저장됨';
    }, 2000);
  }

  // ============ HELPERS ============
  function getActiveScreen() {
    return SCREENS.find(s => s.id === state.activeScreenId);
  }

  function getScreenState(screenId) {
    return state.screens[screenId];
  }

  function screenCounts(screenId) {
    const screen = SCREENS.find(s => s.id === screenId);
    const screenState = state.screens[screenId];
    let total = 0, done = 0;
    screen.sections.forEach((section, sIdx) => {
      section.subs.forEach((sub, subIdx) => {
        sub.items.forEach((_, itemIdx) => {
          total++;
          if (screenState.checks[`${sIdx}.${subIdx}.${itemIdx}`]) done++;
        });
      });
    });
    return { total, done };
  }

  function sectionCounts(screenId, sIdx) {
    const screen = SCREENS.find(s => s.id === screenId);
    const screenState = state.screens[screenId];
    const section = screen.sections[sIdx];
    let total = 0, done = 0;
    section.subs.forEach((sub, subIdx) => {
      sub.items.forEach((_, itemIdx) => {
        total++;
        if (screenState.checks[`${sIdx}.${subIdx}.${itemIdx}`]) done++;
      });
    });
    return { total, done };
  }

  // ============ TABS ============
  function renderTabs() {
    const root = document.getElementById('screen-tabs');
    root.innerHTML = '';
    SCREENS.forEach((screen, idx) => {
      const { total, done } = screenCounts(screen.id);
      const isActive = state.activeScreenId === screen.id;
      const isComplete = done === total && total > 0;

      const btn = document.createElement('button');
      btn.className = 'tab' + (isActive ? ' active' : '');
      btn.innerHTML = `
        <div class="tab-num">${String(idx + 1).padStart(2, '0')}</div>
        <div class="tab-title">${screen.title}</div>
        <div class="tab-progress ${isComplete ? 'complete' : ''}">${done} / ${total}${isComplete ? ' ✓' : ''}</div>
      `;
      btn.addEventListener('click', () => switchScreen(screen.id));
      root.appendChild(btn);
    });
  }

  function switchScreen(screenId) {
    state.activeScreenId = screenId;
    saveState();
    renderTabs();
    renderActiveScreen();
    updateProgressSummary();
    // Scroll to top
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  // ============ RENDER ACTIVE SCREEN ============
  function renderActiveScreen() {
    const screen = getActiveScreen();
    const root = document.getElementById('screens-root');
    root.innerHTML = '';

    // Screen content wrapper
    const wrapper = document.createElement('div');
    wrapper.className = 'screen-content active';
    wrapper.dataset.screenTitle = screen.title;

    // Sections
    screen.sections.forEach((section, sIdx) => {
      const sectionEl = document.createElement('section');
      sectionEl.className = 'section';

      const totals = sectionCounts(screen.id, sIdx);

      sectionEl.innerHTML = `
        <div class="section-header">
          <div class="section-title">
            <span class="section-number">${String(sIdx + 1).padStart(2, '0')}</span>
            <h2>${section.title}</h2>
          </div>
          <div class="section-progress" id="sec-progress-${sIdx}">
            <div class="mini-bar"><div class="mini-bar-fill"></div></div>
            <span class="count"><span class="done">0</span>/<span class="total">${totals.total}</span></span>
          </div>
        </div>
      `;

      section.subs.forEach((sub, subIdx) => {
        const subEl = document.createElement('div');
        subEl.className = 'subsection';
        if (sub.title) {
          const h = document.createElement('div');
          h.className = 'subsection-title';
          h.textContent = sub.title;
          subEl.appendChild(h);
        }
        sub.items.forEach((item, itemIdx) => {
          const id = `${sIdx}.${subIdx}.${itemIdx}`;
          const checked = !!state.screens[screen.id].checks[id];
          const itemEl = document.createElement('div');
          itemEl.className = 'item' + (checked ? ' checked' : '');
          itemEl.dataset.id = id;
          itemEl.innerHTML = `
            <div class="checkbox"></div>
            <div class="item-text">${item}</div>
          `;
          itemEl.addEventListener('click', () => toggleItem(id));
          subEl.appendChild(itemEl);
        });
        sectionEl.appendChild(subEl);
      });

      wrapper.appendChild(sectionEl);
    });

    // Issue log for this screen
    const issueLog = document.createElement('section');
    issueLog.className = 'issue-log';
    issueLog.innerHTML = `
      <h2>${screen.title} — <span class="italic">이슈 기록</span></h2>
      <p class="subtitle">이 화면의 검토 중 발견한 이슈를 기록하세요. 자동 저장됩니다.</p>
      <table class="issues-table">
        <thead>
          <tr>
            <th style="width: 50px">#</th>
            <th>항목</th>
            <th>이슈 내용</th>
            <th style="width: 110px">우선순위</th>
            <th style="width: 120px">담당자</th>
            <th style="width: 110px">상태</th>
            <th style="width: 40px"></th>
          </tr>
        </thead>
        <tbody id="issues-body"></tbody>
      </table>
      <button class="add-issue-btn" onclick="addIssue()">+ 이슈 추가</button>
    `;
    wrapper.appendChild(issueLog);

    root.appendChild(wrapper);

    updateAllSectionProgress();
    renderIssues();
  }

  // ============ TOGGLE ============
  function toggleItem(id) {
    const screen = getActiveScreen();
    const screenState = state.screens[screen.id];
    screenState.checks[id] = !screenState.checks[id];
    const el = document.querySelector(`.item[data-id="${id}"]`);
    if (el) el.classList.toggle('checked', screenState.checks[id]);
    updateAllSectionProgress();
    updateProgressSummary();
    renderTabs(); // update tab counters
    saveState();
  }

  function updateAllSectionProgress() {
    const screen = getActiveScreen();
    screen.sections.forEach((_, sIdx) => {
      const { total, done } = sectionCounts(screen.id, sIdx);
      const sec = document.getElementById(`sec-progress-${sIdx}`);
      if (sec) {
        const pct = total === 0 ? 0 : (done / total) * 100;
        sec.querySelector('.mini-bar-fill').style.width = pct + '%';
        sec.querySelector('.done').textContent = done;
        sec.classList.toggle('complete', done === total && total > 0);
      }
    });
  }

  function updateProgressSummary() {
    const screen = getActiveScreen();
    const { total, done } = screenCounts(screen.id);
    const pct = total === 0 ? 0 : Math.round((done / total) * 100);

    document.getElementById('progress-screen-name').textContent = screen.title;
    document.getElementById('percent-num').textContent = pct;
    document.getElementById('progress-fill').style.width = pct + '%';
    document.getElementById('count-done').textContent = done;
    document.getElementById('count-total').textContent = total;
    document.getElementById('count-left').textContent = total - done;

    // Overall stats
    let oTotal = 0, oDone = 0, oIssues = 0;
    SCREENS.forEach(s => {
      const c = screenCounts(s.id);
      oTotal += c.total;
      oDone += c.done;
      oIssues += state.screens[s.id].issues.length;
    });
    const oPct = oTotal === 0 ? 0 : Math.round((oDone / oTotal) * 100);
    document.getElementById('overall-percent').textContent = oPct;
    document.getElementById('overall-issues').textContent = oIssues;
  }

  // ============ ISSUES ============
  function renderIssues() {
    const screen = getActiveScreen();
    const screenState = state.screens[screen.id];
    const body = document.getElementById('issues-body');
    if (!body) return;
    body.innerHTML = '';
    screenState.issues.forEach((issue, idx) => {
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td style="padding: 10px 12px; font-family: 'JetBrains Mono', monospace; font-size: 13px; color: var(--muted)">${String(idx + 1).padStart(2, '0')}</td>
        <td><input data-field="area" placeholder="예: 비밀번호 유효성" value="${escapeAttr(issue.area || '')}"></td>
        <td><input data-field="content" placeholder="이슈 내용" value="${escapeAttr(issue.content || '')}"></td>
        <td>
          <select data-field="priority">
            <option value="">—</option>
            <option value="high" ${issue.priority === 'high' ? 'selected' : ''}>높음</option>
            <option value="mid" ${issue.priority === 'mid' ? 'selected' : ''}>중간</option>
            <option value="low" ${issue.priority === 'low' ? 'selected' : ''}>낮음</option>
          </select>
        </td>
        <td><input data-field="owner" placeholder="담당자" value="${escapeAttr(issue.owner || '')}"></td>
        <td>
          <select data-field="status">
            <option value="open" ${issue.status === 'open' || !issue.status ? 'selected' : ''}>Open</option>
            <option value="progress" ${issue.status === 'progress' ? 'selected' : ''}>진행 중</option>
            <option value="done" ${issue.status === 'done' ? 'selected' : ''}>해결</option>
            <option value="hold" ${issue.status === 'hold' ? 'selected' : ''}>보류</option>
          </select>
        </td>
        <td><button class="delete-issue" onclick="deleteIssue(${idx})" title="삭제">×</button></td>
      `;
      tr.querySelectorAll('input, select').forEach(inp => {
        const handler = () => {
          screenState.issues[idx][inp.dataset.field] = inp.value;
          saveState();
        };
        inp.addEventListener('input', handler);
        inp.addEventListener('change', handler);
      });
      body.appendChild(tr);
    });
  }

  function addIssue() {
    const screen = getActiveScreen();
    state.screens[screen.id].issues.push({
      area: '', content: '', priority: '', owner: '', status: 'open'
    });
    renderIssues();
    updateProgressSummary();
    saveState();
  }

  function deleteIssue(idx) {
    const screen = getActiveScreen();
    state.screens[screen.id].issues.splice(idx, 1);
    renderIssues();
    updateProgressSummary();
    saveState();
  }

  function escapeAttr(s) {
    return String(s).replace(/"/g, '&quot;').replace(/</g, '&lt;');
  }

  // ============ META ============
  function bindMeta() {
    ['reviewer', 'date', 'env'].forEach(field => {
      const el = document.getElementById('meta-' + field);
      if (state.meta[field]) el.value = state.meta[field];
      el.addEventListener('input', () => {
        state.meta[field] = el.value;
        saveState();
      });
    });
  }

  // ============ RESET ============
  function resetCurrentScreen() {
    const screen = getActiveScreen();
    if (!confirm(`"${screen.title}" 화면의 모든 체크와 이슈를 초기화합니다. 진행하시겠습니까?`)) return;
    state.screens[screen.id] = { checks: {}, issues: [] };
    saveState();
    renderActiveScreen();
    updateProgressSummary();
    renderTabs();
  }

  // ============ INIT ============
  (async function init() {
    await loadState();
    bindMeta();
    renderTabs();
    renderActiveScreen();
    updateProgressSummary();
  })();
</script>
</body>
</html>
